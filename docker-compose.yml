services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - VITE_API_URL=/api
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=/api

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - FLASK_ENV=production
      - CORS_ORIGINS=http://localhost:5173
